<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Q&A Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
      color: #e2e8f0;
      padding: 20px;
    }

    .page {
      width: min(1200px, 100%);
      display: grid;
      gap: 18px;
    }

    .toolbar {
      display: none;
      justify-content: flex-end;
    }

    .toolbar button {
      border: none;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.14);
      color: #ffffff;
      padding: 12px 18px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .toolbar button:hover,
    .toolbar button:focus-visible {
      background: rgba(255, 255, 255, 0.24);
      transform: translateY(-1px);
      outline: none;
    }

    .layout {
      display: grid;
      gap: 24px;
      grid-template-columns: 1fr;
    }

    .sidebar,
    .main {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
    }

    .sidebar h1,
    .main h1 {
      margin: 0 0 18px;
      font-size: clamp(1.9rem, 2.4vw, 2.8rem);
      color: #ffffff;
    }

    .intro,
    .status {
      margin: 0;
      color: rgba(226, 232, 240, 0.88);
      line-height: 1.75;
      font-size: 1rem;
    }

    .status {
      margin-top: 16px;
    }

    .file-buttons {
      display: grid;
      gap: 14px;
      margin-top: 22px;
    }

    .file-button {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 16px 18px;
      background: rgba(255, 255, 255, 0.06);
      color: #f8fafc;
      text-align: left;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .file-button:hover,
    .file-button:focus-visible {
      background: rgba(96, 165, 250, 0.18);
      border-color: rgba(96, 165, 250, 0.45);
      transform: translateY(-1px);
      outline: none;
    }

    .qa-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .file-name {
      margin: 0;
      color: #ffffff;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .qa-content {
      display: grid;
      gap: 16px;
    }

    details {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 18px 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    details:hover {
      transform: translateY(-1px);
    }

    details[open] {
      background: rgba(59, 130, 246, 0.14);
      border-color: rgba(59, 130, 246, 0.35);
    }

    summary {
      list-style: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      outline: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::before {
      content: '▶';
      display: inline-block;
      width: 1.2em;
      transform: rotate(0deg);
      transition: transform 0.2s ease;
      margin-right: 10px;
    }

    details[open] summary::before {
      transform: rotate(90deg);
    }

    details p {
      margin: 16px 0 0;
      color: rgba(226, 232, 240, 0.95);
      white-space: pre-wrap;
      line-height: 1.75;
    }

    .sidebar.hidden {
      display: none;
    }

    @media (min-width: 940px) {
      .toolbar {
        display: none;
      }

      .layout {
        grid-template-columns: 320px minmax(0, 1fr);
      }

      .sidebar {
        position: sticky;
        top: 20px;
        align-self: start;
      }
    }

    @media (max-width: 940px) {
      .toolbar {
        display: flex;
      }

      .sidebar {
        order: -1;
        display: none;
      }
    }

    @media (max-width: 660px) {
      body {
        padding: 12px;
      }

      .sidebar,
      .main {
        padding: 22px;
      }

      .file-button {
        padding: 14px 16px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="toolbar">
      <button id="toggleFiles" type="button">Show files</button>
    </div>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <h1>Q&A Files</h1>
        <p class="intro">Pick a text file to view. Headings beginning with <strong>#</strong> become collapsible
          questions, and the following text is shown as the answer.</p>
        <p class="status" id="fileStatus">Loading files…</p>
        <div id="fileButtons" class="file-buttons"></div>
      </aside>

      <main class="main">
        <div class="qa-header">
          <div>
            <p class="file-name" id="selectedFileName">Select a file to begin</p>
            <p class="status" id="contentStatus">No file selected yet.</p>
          </div>
        </div>

        <div id="qaContent" class="qa-content"></div>
      </main>
    </div>
  </div>

  <script>
    const fileStatus = document.getElementById('fileStatus');
    const fileButtons = document.getElementById('fileButtons');
    const selectedFileName = document.getElementById('selectedFileName');
    const contentStatus = document.getElementById('contentStatus');
    const qaContent = document.getElementById('qaContent');
    const sidebar = document.getElementById('sidebar');
    const toggleFiles = document.getElementById('toggleFiles');

    let availableFiles = [];

    function showSidebar() {
      sidebar.classList.remove('hidden');
      toggleFiles.textContent = 'Hide files';
    }

    function hideSidebar() {
      sidebar.classList.add('hidden');
      toggleFiles.textContent = 'Show files';
    }

    toggleFiles.addEventListener('click', () => {
      if (sidebar.classList.contains('hidden')) {
        showSidebar();
      } else {
        hideSidebar();
      }
    });

    function parseQa(text) {
      const lines = text.replace(/\r/g, '').split('\n');
      const entries = [];
      let current = null;

      lines.forEach(line => {
        if (line.trim().startsWith('#')) {
          if (current) {
            entries.push(current);
          }
          current = {
            question: line.replace(/^#+\s*/, '').trim() || 'Untitled question',
            answer: ''
          };
        } else if (current) {
          current.answer += (current.answer ? '\n' : '') + line;
        }
      });

      if (current) {
        entries.push(current);
      }
      return entries;
    }

    function renderEntries(entries) {
      qaContent.innerHTML = '';
      if (!entries.length) {
        contentStatus.textContent = 'No questions found. Use # headings to add questions.';
        return;
      }

      contentStatus.textContent = 'Tap a question to expand its answer.';
      entries.forEach(entry => {
        const details = document.createElement('details');
        const summary = document.createElement('summary');
        summary.textContent = entry.question;
        const paragraph = document.createElement('p');
        paragraph.textContent = entry.answer.trim() || 'No answer provided yet.';
        details.appendChild(summary);
        details.appendChild(paragraph);
        qaContent.appendChild(details);
      });
    }

    function selectFile(filename) {
      selectedFileName.textContent = `Showing: ${filename}`;
      contentStatus.textContent = 'Loading answers…';
      qaContent.innerHTML = '';

      fetch(encodeURI(filename))
        .then(response => {
          if (!response.ok) {
            throw new Error('Could not load ' + filename);
          }
          return response.text();
        })
        .then(text => {
          const entries = parseQa(text);
          renderEntries(entries);
          if (window.innerWidth <= 940) {
            hideSidebar();
          }
        })
        .catch(() => {
          contentStatus.textContent = `Unable to load file: ${filename}.`;
        });
    }

    function renderFileButtons(files) {
      fileButtons.innerHTML = '';
      if (!files.length) {
        fileStatus.textContent = 'No files found. Add file names to files.json.';
        return;
      }

      fileStatus.textContent = 'Select a text file to view its Q&A.';
      files.forEach(file => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'file-button';
        button.textContent = file;
        button.addEventListener('click', () => {
          history.pushState(null, '', `#${encodeURIComponent(file)}`);
          selectFile(file);
        });
        fileButtons.appendChild(button);
      });
    }

    function loadFileList() {
      fetch('files.json')
        .then(response => {
          if (!response.ok) {
            throw new Error('Could not load files.json');
          }
          return response.json();
        })
        .then(files => {
          availableFiles = Array.isArray(files) ? files : [];
          renderFileButtons(availableFiles);
          const hashFile = decodeURIComponent(window.location.hash.slice(1));
          if (hashFile && availableFiles.includes(hashFile)) {
            selectFile(hashFile);
          }
        })
        .catch(() => {
          fileStatus.textContent = 'Unable to load files.json. Add a files.json listing all .txt files.';
          selectedFileName.textContent = 'No files available.';
        });
    }

    window.addEventListener('popstate', () => {
      const hashFile = decodeURIComponent(window.location.hash.slice(1));
      if (hashFile && availableFiles.includes(hashFile)) {
        selectFile(hashFile);
      }
    });

    loadFileList();
  </script>
</body>

</html>
