<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q&A File Viewer</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #3b82f6, #9333ea);
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .page {
      width: min(1000px, 100%);
      max-width: 1000px;
      display: grid;
      gap: 24px;
    }

    .content {
      background: rgba(15, 23, 42, 0.92);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
    }

    h1 {
      margin-top: 0;
      font-size: clamp(2rem, 3vw, 3rem);
      letter-spacing: -0.03em;
    }

    p {
      line-height: 1.7;
      color: rgba(248, 250, 252, 0.88);
      margin: 0;
    }

    .status {
      margin: 18px 0 0;
      color: rgba(226, 232, 240, 0.9);
      font-size: 0.96rem;
    }

    .file-buttons {
      display: grid;
      gap: 14px;
      margin-top: 22px;
    }

    .file-button {
      border: 1px solid rgba(255, 255, 255, 0.14);
      padding: 16px 20px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      color: #f8fafc;
      font-size: 1rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    }

    .file-button:hover,
    .file-button:focus-visible {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(251, 191, 36, 0.5);
      transform: translateY(-1px);
      outline: none;
    }

    .qa-view {
      margin-top: 28px;
    }

    .qa-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .file-name {
      margin: 0;
      font-weight: 700;
      color: #ffffff;
    }

    .back-button {
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      color: #f8fafc;
      padding: 12px 18px;
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .back-button:hover,
    .back-button:focus-visible {
      background: rgba(251, 191, 36, 0.18);
      transform: translateY(-1px);
      outline: none;
    }

    details {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 18px 20px;
      margin-bottom: 14px;
      transition: background 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    details[open] {
      background: rgba(249, 115, 22, 0.16);
    }

    summary {
      cursor: pointer;
      list-style: none;
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      outline: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::before {
      content: '▶';
      display: inline-block;
      width: 1.2em;
      transform: rotate(0deg);
      transition: transform 0.2s ease;
      margin-right: 10px;
    }

    details[open] summary::before {
      transform: rotate(90deg);
    }

    details p {
      margin: 14px 0 0;
      color: rgba(226, 232, 240, 0.95);
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 740px) {
      body {
        padding: 12px;
      }

      .content {
        padding: 22px;
      }

      .qa-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <main class="content">
      <h1>Q&A File Viewer</h1>
      <p>Choose a text file from the list below. Each file is parsed for questions starting with <strong>#</strong>, then shown as collapsible entries.</p>
      <p class="status" id="fileStatus">Loading text files…</p>
      <div id="fileButtons" class="file-buttons"></div>
      <div class="qa-view hidden" id="qaView">
        <div class="qa-header">
          <div>
            <p class="file-name" id="selectedFileName"></p>
            <p class="status" id="contentStatus">Loading answers…</p>
          </div>
          <button class="back-button" id="backButton" type="button">Back to files</button>
        </div>
        <div id="qaContent"></div>
      </div>
    </main>
  </div>

  <script>
    const fileStatus = document.getElementById('fileStatus');
    const fileButtons = document.getElementById('fileButtons');
    const qaView = document.getElementById('qaView');
    const selectedFileName = document.getElementById('selectedFileName');
    const contentStatus = document.getElementById('contentStatus');
    const qaContent = document.getElementById('qaContent');
    const backButton = document.getElementById('backButton');

    let availableFiles = [];

    backButton.addEventListener('click', () => {
      showFileList();
      history.pushState(null, '', window.location.pathname);
    });

    function parseQa(text) {
      const lines = text.replace(/\r/g, '').split('\n');
      const entries = [];
      let current = null;

      lines.forEach(line => {
        if (line.trim().startsWith('#')) {
          if (current) {
            entries.push(current);
          }
          current = {
            question: line.replace(/^#+\s*/, '').trim() || 'Untitled question',
            answer: ''
          };
        } else if (current) {
          current.answer += (current.answer ? '\n' : '') + line;
        }
      });

      if (current) {
        entries.push(current);
      }
      return entries;
    }

    function renderFileButtons(files) {
      fileButtons.innerHTML = '';
      if (!files.length) {
        fileStatus.textContent = 'No text files found. Add names to files.json.';
        return;
      }

      fileStatus.textContent = 'Choose a text file to view its questions and answers.';
      files.forEach(file => {
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = file;
        button.className = 'file-button';
        button.addEventListener('click', () => {
          loadQaFile(file);
          history.pushState(null, '', `#${encodeURIComponent(file)}`);
        });
        fileButtons.appendChild(button);
      });
    }

    function showFileList() {
      qaView.classList.add('hidden');
      fileButtons.style.display = 'grid';
      selectedFileName.textContent = '';
      contentStatus.textContent = '';
      fileStatus.textContent = 'Choose a text file to view its questions and answers.';
      qaContent.innerHTML = '';
    }

    function showQaView(filename) {
      qaView.classList.remove('hidden');
      fileButtons.style.display = 'none';
      selectedFileName.textContent = `Showing: ${filename}`;
      fileStatus.textContent = '';
    }

    function loadQaFile(filename) {
      showQaView(filename);
      contentStatus.textContent = 'Loading answers…';
      qaContent.innerHTML = '';

      fetch(encodeURI(filename))
        .then(response => {
          if (!response.ok) {
            throw new Error('Could not load ' + filename);
          }
          return response.text();
        })
        .then(text => {
          const entries = parseQa(text);
          renderEntries(entries);
          contentStatus.textContent = entries.length
            ? 'Tap a question to expand its answer.'
            : 'No questions found. Use # for questions.';
        })
        .catch(() => {
          fileStatus.textContent = `Unable to load file: ${filename}`;
          contentStatus.textContent = 'Make sure the file exists and is accessible.';
        });
    }

    function renderEntries(entries) {
      qaContent.innerHTML = '';
      entries.forEach(entry => {
        const details = document.createElement('details');
        const summary = document.createElement('summary');
        summary.textContent = entry.question;
        const paragraph = document.createElement('p');
        paragraph.textContent = entry.answer.trim() || 'No answer provided yet.';
        details.appendChild(summary);
        details.appendChild(paragraph);
        qaContent.appendChild(details);
      });
    }

    function loadFileList() {
      fetch('files.json')
        .then(response => {
          if (!response.ok) {
            throw new Error('Could not load files.json');
          }
          return response.json();
        })
        .then(files => {
          availableFiles = Array.isArray(files) ? files : [];
          renderFileButtons(availableFiles);
          const hashFile = decodeURIComponent(window.location.hash.slice(1));
          if (hashFile && availableFiles.includes(hashFile)) {
            loadQaFile(hashFile);
          }
        })
        .catch(() => {
          fileStatus.textContent = 'Unable to load files.json. Add a files.json listing all .txt files.';
        });
    }

    window.addEventListener('popstate', () => {
      const hashFile = decodeURIComponent(window.location.hash.slice(1));
      if (hashFile && availableFiles.includes(hashFile)) {
        loadQaFile(hashFile);
      } else {
        showFileList();
      }
    });

    loadFileList();
  </script>
</body>

</html>
